<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — LitoClips</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;700&family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    .signup-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
    .signup-card { width: 100%; max-width: 440px; background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 40px; }
    .signup-card h1 { font-size: 24px; margin-bottom: 8px; }
    .signup-card .subtitle { color: rgba(255,255,255,0.6); font-size: 15px; margin-bottom: 24px; }
    .signup-card .form-group { margin-bottom: 20px; }
    .signup-card .form-error { color: #ef4444; font-size: 14px; margin-top: 8px; }
    .signup-card .btn-full { width: 100%; justify-content: center; margin-top: 8px; }
    .signup-footer { margin-top: 24px; text-align: center; }
    .signup-footer a { color: #2563eb; text-decoration: none; font-size: 14px; }
    .signup-footer a:hover { text-decoration: underline; }
    .back-home { display: inline-block; margin-bottom: 24px; color: rgba(255,255,255,0.6); font-size: 14px; text-decoration: none; }
    .back-home:hover { color: #2563eb; }
    .role-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .role-tab { flex: 1; padding: 12px; text-align: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer; font-size: 14px; color: rgba(255,255,255,0.7); }
    .role-tab:hover { background: rgba(255,255,255,0.08); color: white; }
    .role-tab.selected { background: rgba(37, 99, 235, 0.2); border-color: #2563eb; color: white; }
    .role-tab input { display: none; }
  </style>
</head>
<body class="gradient-section-bg">
  <a href="index.html" class="back-home">← Back to home</a>
  <main class="signup-page">
    <div class="signup-card">
      <h1>Create your account</h1>
      <p class="subtitle">Choose your profile and get started</p>
      <a href="#" class="oauth-btn google" id="googleSignupBtn" style="display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 20px;margin-bottom:20px;background:#fff;color:#333;border:1px solid rgba(0,0,0,0.1);border-radius:12px;text-decoration:none;font-size:15px;">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign up with Google
      </a>
      <div class="oauth-divider" style="display:flex;align-items:center;gap:16px;margin:20px 0;"><span style="flex:1;height:1px;background:rgba(255,255,255,0.1);"></span><span style="color:rgba(255,255,255,0.4);font-size:13px;">or</span><span style="flex:1;height:1px;background:rgba(255,255,255,0.1);"></span></div>
      <form id="signupForm" class="auth-form">
        <div class="role-tabs" role="group" aria-label="Account type">
          <label class="role-tab selected" data-value="creator">
            <input type="radio" name="userType" value="creator" checked> Creator
          </label>
          <label class="role-tab" data-value="brand">
            <input type="radio" name="userType" value="brand"> Brand
          </label>
          <label class="role-tab" data-value="sponsor">
            <input type="radio" name="userType" value="sponsor"> Sponsor
          </label>
        </div>
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" required placeholder="Jane Doe">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="6" placeholder="At least 6 characters">
          <small>Must be at least 6 characters</small>
        </div>
        <div class="form-error" id="formError"></div>
        <button type="submit" class="btn btn-primary btn-full">Create account</button>
      </form>
      <div class="signup-footer">
        <p>Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </main>
  <script>
    (function() {
      const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      const API_URL = isLocal ? 'http://localhost:37373/api/auth' : (window.location.origin + '/api/auth');
      const AUTH_BASE = isLocal ? 'http://localhost:37373' : window.location.origin;
      const form = document.getElementById('signupForm');
      const googleBtn = document.getElementById('googleSignupBtn');
      if (googleBtn) googleBtn.href = AUTH_BASE + '/auth/google';
      const formError = document.getElementById('formError');
      const params = new URLSearchParams(window.location.search);
      if (params.get('error')) {
        formError.textContent = 'Sign-in failed. Please try again.';
        window.history.replaceState({}, '', 'signup.html');
      }
      const tabs = document.querySelectorAll('.role-tab');

      // Role tab selection
      tabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
          tabs.forEach(function(t) { t.classList.remove('selected'); });
          tab.classList.add('selected');
          tab.querySelector('input').checked = true;
        });
      });

      function getDashboardHref(userType) {
        if (userType === 'brand') return 'brand-overview.html';
        if (userType === 'sponsor') return 'sponsor-dashboard.html';
        return 'dashboard-creator.html';
      }

      // Pre-select role from URL ?type=sponsor
      const typeParam = params.get('type');
      if (['creator', 'brand', 'sponsor'].includes(typeParam)) {
        tabs.forEach(function(t) {
          t.classList.toggle('selected', t.dataset.value === typeParam);
          t.querySelector('input').checked = (t.dataset.value === typeParam);
        });
      }

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        formError.textContent = '';
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const userType = form.querySelector('input[name="userType"]:checked').value;
        try {
          const res = await fetch(API_URL + '/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password, userType })
          });
          const data = await res.json().catch(function() { return {}; });
          if (res.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            localStorage.setItem('userType', data.user.userType || 'creator');
            window.location.href = getDashboardHref(data.user.userType);
          } else {
            formError.textContent = data.error || 'Something went wrong. Please try again.';
          }
        } catch (err) {
          formError.textContent = 'Network error. Please try again.';
        }
      });
    })();
  </script>
</body>
</html>
