  <script>
    const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    const API_URL = isLocalhost ? 'http://localhost:37373/api' : `${window.location.origin}/api`;

    const ACHIEVEMENTS = [
      { id: 'first_submission', name: 'First Blood', desc: 'Submit your first content', icon: '🎯', xp: 100, category: 'submissions' },
      { id: 'five_submissions', name: 'Getting Started', desc: 'Submit 5 pieces of content', icon: '📝', xp: 200, category: 'submissions' },
      { id: 'twenty_submissions', name: 'Content Creator', desc: 'Submit 20 pieces of content', icon: '🎬', xp: 500, category: 'submissions' },
      { id: 'fifty_submissions', name: 'Prolific', desc: 'Submit 50 pieces of content', icon: '🏭', xp: 1000, category: 'submissions' },
      { id: 'hundred_submissions', name: 'Content Machine', desc: 'Submit 100 pieces of content', icon: '🤖', xp: 2500, category: 'submissions' },
      
      { id: 'first_1k_views', name: 'View Getter', desc: 'Reach 1,000 total views', icon: '👁️', xp: 100, category: 'views' },
      { id: 'ten_k_views', name: 'Going Viral', desc: 'Reach 10,000 total views', icon: '📈', xp: 300, category: 'views' },
      { id: 'hundred_k_views', name: 'View Machine', desc: 'Reach 100,000 total views', icon: '🔥', xp: 1000, category: 'views' },
      { id: 'million_views', name: 'Viral Sensation', desc: 'Reach 1,000,000 total views', icon: '🌟', xp: 5000, category: 'views' },
      
      { id: 'first_earning', name: 'First Paycheck', desc: 'Earn your first dollar', icon: '💵', xp: 150, category: 'earnings' },
      { id: 'ten_dollars', name: 'Money Maker', desc: 'Earn $10 total', icon: '💰', xp: 200, category: 'earnings' },
      { id: 'hundred_dollars', name: 'Hustler', desc: 'Earn $100 total', icon: '💎', xp: 500, category: 'earnings' },
      { id: 'thousand_dollars', name: 'Big Earner', desc: 'Earn $1,000 total', icon: '🏆', xp: 2000, category: 'earnings' },
      
      { id: 'week_streak', name: 'Weekly Warrior', desc: 'Maintain a 7-day login streak', icon: '📅', xp: 100, category: 'streaks' },
      { id: 'month_streak', name: 'Dedicated', desc: 'Maintain a 30-day login streak', icon: '🗓️', xp: 500, category: 'streaks' },
      { id: 'hundred_streak', name: 'Unstoppable', desc: 'Maintain a 100-day login streak', icon: '🔥', xp: 2000, category: 'streaks' },
      
      { id: 'all_platforms', name: 'Platform Master', desc: 'Submit on all 4 platforms', icon: '🌐', xp: 500, category: 'special' },
      { id: 'referral', name: 'Networker', desc: 'Refer a friend who joins', icon: '🤝', xp: 300, category: 'special' },
      { id: 'level_10', name: 'Rising Star', desc: 'Reach level 10', icon: '⭐', xp: 1000, category: 'special' },
      { id: 'level_25', name: 'Expert', desc: 'Reach level 25', icon: '💫', xp: 2500, category: 'special' },
    ];

    document.addEventListener('DOMContentLoaded', () => {
      loadUserData();
      loadAchievements();
      setupTabs();
    });

    async function loadUserData() {
      try {
        const token = localStorage.getItem('token');
        if (token) {
          const response = await fetch(`${API_URL}/auth/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (response.ok) {
            const user = await response.json();
            document.getElementById('userName').textContent = user.name || 'User';
          }
          
          // Load gamification profile for XP/Level
          const gamRes = await fetch(`${API_URL}/gamification/profile`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (gamRes.ok) {
            const profile = await gamRes.json();
            updateHeaderXP(profile);
          }
        }
      } catch (e) { console.error(e); }
    }
    
    function updateHeaderXP(profile) {
      const level = profile.level || 1;
      const xp = profile.xp || 0;
      const nextLevelXP = profile.nextLevelXP || 100;
      
      const levelCircle = document.getElementById('headerLevel');
      const levelXP = document.querySelector('.level-xp');
      
      if (levelCircle) levelCircle.textContent = level;
      if (levelXP) levelXP.textContent = `${xp} / ${nextLevelXP} XP`;
    }

    async function loadAchievements() {
      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`${API_URL}/gamification/achievements`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        let userAchievements = [];
        if (response.ok) {
          const data = await response.json();
          userAchievements = data.achievements || [];
        }

        renderAchievements(ACHIEVEMENTS, userAchievements);
        updateStats(userAchievements);
      } catch (e) {
        console.error(e);
        renderAchievements(ACHIEVEMENTS, []);
      }
    }

    function renderAchievements(allAchievements, userAchievements) {
      const grid = document.getElementById('achievementsGrid');
      const earnedIds = new Set(userAchievements.filter(a => a.earned).map(a => a.id));

      grid.innerHTML = allAchievements.map(achievement => {
        const isEarned = earnedIds.has(achievement.id);
        const userAchievement = userAchievements.find(a => a.id === achievement.id);
        const progress = userAchievement?.progress || 0;
        const target = userAchievement?.target || 1;

        return `
          <div class="achievement-card ${isEarned ? 'earned' : 'locked'}">
            <div class="achievement-icon">${achievement.icon}</div>
            <div class="achievement-name">${achievement.name}</div>
            <div class="achievement-desc">${achievement.desc}</div>
            <div class="achievement-xp">+${achievement.xp} XP</div>
            ${!isEarned ? `
              <div class="achievement-progress">
                <div class="achievement-progress-text">
                  <span>Progress</span>
                  <span>${progress}/${target}</span>
                </div>
                <div class="achievement-progress-bar">
                  <div class="achievement-progress-fill" style="width: ${Math.min(100, (progress / target) * 100)}%"></div>
                </div>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    function updateStats(userAchievements) {
      const earned = userAchievements.filter(a => a.earned).length;
      const total = ACHIEVEMENTS.length;
      const xp = userAchievements.filter(a => a.earned).reduce((sum, a) => {
        const achievement = ACHIEVEMENTS.find(ach => ach.id === a.id);
        return sum + (achievement?.xp || 0);
      }, 0);

      document.getElementById('earnedCount').textContent = earned;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('totalXP').textContent = xp.toLocaleString();
      document.getElementById('completionRate').textContent = Math.round((earned / total) * 100) + '%';
    }

    function setupTabs() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          
          const category = tab.dataset.category;
          filterAchievements(category);
        });
      });
    }

    function filterAchievements(category) {
      const filtered = category === 'all' 
        ? ACHIEVEMENTS 
        : ACHIEVEMENTS.filter(a => a.category === category);
      
      // Re-render with filtered achievements
      loadAchievements();
    }

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      localStorage.removeItem('token');
      window.location.href = 'index-2.html';
    });
  </script>
