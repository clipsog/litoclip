            <input type="text" id="searchInput" placeholder="Search campaigns..." style="width: 100%; padding: 14px 16px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px;">
          </div>
          <select id="platformFilter" style="padding: 14px 16px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; min-width: 150px;">

  <!-- Campaign Details Modal -->
  <div class="modal-overlay" id="campaignModal">
    <div class="modal modal-large">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div id="campaignModalContent"></div>
    </div>

  <script src="dashboard.js"></script>
  <script src="auth.js"></script>
  <script>
    const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    const API_URL = isLocalhost ? 'http://localhost:37373/api' : `${window.location.origin}/api`;

    document.addEventListener('DOMContentLoaded', async () => {
      await loadJoinedCampaigns();
      await loadCampaigns();
      loadUserData();
    });

    async function loadUserData() {
      try {
        const token = localStorage.getItem('token');
        if (token) {
          // Load user info
          const response = await fetch(`${API_URL}/auth/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (response.ok) {
            const user = await response.json();
            document.getElementById('userName').textContent = user.name || 'User';
          }
          
          // Load gamification profile for XP/Level
          const gamRes = await fetch(`${API_URL}/gamification/profile`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (gamRes.ok) {
            const profile = await gamRes.json();
            updateHeaderXP(profile);
          }
        }
      } catch (e) { console.error(e); }
    }
    
    function updateHeaderXP(profile) {
      const level = profile.level || 1;
      const xp = profile.xp || 0;
      const xpToNext = profile.xp_to_next_level || 100;
      const currentLevelXP = profile.currentLevelXP || 0;
      const nextLevelXP = profile.nextLevelXP || 100;
      
      // Update header elements
      const levelCircle = document.getElementById('headerLevel');
      const levelXP = document.querySelector('.level-xp');
      
      if (levelCircle) levelCircle.textContent = level;
      if (levelXP) levelXP.textContent = `${xp} / ${nextLevelXP} XP`;
    }

    async function loadCampaigns() {
      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`${API_URL}/campaigns`, {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {}
        });
        
        if (response.ok) {
          const campaigns = await response.json();
          allCampaigns = campaigns.filter(c => c.status === 'active');
          renderCampaigns(allCampaigns);
        }
      } catch (e) {
        console.error('Failed to load campaigns:', e);
      }
    }

    function renderCampaigns(campaigns) {
      const grid = document.getElementById('campaignsGrid');
      
      if (campaigns.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="empty-state-icon">📢</div>
            <div class="empty-state-title">No campaigns available</div>
            <div class="empty-state-text">Check back soon for new opportunities</div>
          </div>
        `;
        return;
      }

      grid.innerHTML = campaigns.map(campaign => `
        <div class="campaign-card" onclick="openCampaign('${campaign.id}')">
          <img src="${campaign.cover_image || campaign.coverImage || campaign.image || 'https://placehold.co/400x200/142424/14b8a6?text=Campaign'}" alt="${campaign.title}" class="campaign-image" onerror="this.onerror=null;this.src='https://placehold.co/400x200/142424/14b8a6?text=Campaign'">
          <div class="campaign-content">
            <div class="campaign-brand">${campaign.brand || 'Brand'}</div>
            <div class="campaign-title">${campaign.title}</div>
            <div class="campaign-meta">
              <div class="campaign-meta-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                ${campaign.endDate ? new Date(campaign.endDate).toLocaleDateString() : 'Ongoing'}
              </div>
              <div class="campaign-meta-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                ${campaign.joinedCount || 0} joined
              </div>
            </div>
            <div class="campaign-payout">
              <span class="campaign-payout-label">Payout per 1K views</span>
              <span class="campaign-payout-value">$${(campaign.cpm_rate || campaign.cpmRate || 0).toFixed(2)}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    let allCampaigns = [];
    let joinedCampaignIds = [];

    async function loadJoinedCampaigns() {
      try {
        const token = localStorage.getItem('token');
        if (!token) return;
        const response = await fetch(`${API_URL}/campaigns/my-campaigns`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
          const data = await response.json();
          joinedCampaignIds = (data || []).map(c => c.campaign_id || c.id);
        }
      } catch (e) { console.error('Error loading joined campaigns:', e); }
    }

    async function openCampaign(id) {
      const campaign = allCampaigns.find(c => c.id === id);
      if (!campaign) return;

      const isJoined = joinedCampaignIds.includes(id);
      const modal = document.getElementById('campaignModal');
      const content = document.getElementById('campaignModalContent');
      
      const platforms = Array.isArray(campaign.platforms) ? campaign.platforms : JSON.parse(campaign.platforms || '[]');
      
      content.innerHTML = `
        <div style="padding: 30px;">
          <img src="${campaign.cover_image || campaign.coverImage || 'https://placehold.co/600x300/142424/14b8a6?text=Campaign'}" alt="${campaign.title}" style="width: 100%; height: 220px; object-fit: cover; border-radius: 12px; margin-bottom: 24px;" onerror="this.onerror=null;this.src='https://placehold.co/600x300/142424/14b8a6?text=Campaign'">
          <h2 style="font-size: 28px; margin-bottom: 8px; color: var(--text);">${campaign.title}</h2>
          <p style="color: var(--text-secondary); margin-bottom: 28px; line-height: 1.5;">${campaign.description || 'No description provided.'}</p>
          
          <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px;">
            <div style="background: var(--bg-elevated); padding: 20px; border-radius: 12px; text-align: center;">
              <div style="font-size: 26px; font-weight: 700; color: var(--teal); margin-bottom: 4px;">$${(campaign.cpm_rate || campaign.cpmRate || 0).toFixed(2)}</div>
              <div style="font-size: 13px; color: var(--text-secondary);">Per 1K Views</div>
            </div>
            <div style="background: var(--bg-elevated); padding: 20px; border-radius: 12px; text-align: center;">
              <div style="font-size: 26px; font-weight: 700; color: var(--teal); margin-bottom: 4px;">$${(campaign.budget || 0).toLocaleString()}</div>
              <div style="font-size: 13px; color: var(--text-secondary);">Total Budget</div>
            </div>
            <div style="background: var(--bg-elevated); padding: 20px; border-radius: 12px; text-align: center;">
              <div style="font-size: 26px; font-weight: 700; color: var(--teal); text-transform: capitalize; margin-bottom: 4px;">${campaign.status || 'Active'}</div>
              <div style="font-size: 13px; color: var(--text-secondary);">Status</div>
            </div>
          </div>

          <div style="margin-bottom: 28px;">
            <h3 style="font-size: 16px; margin-bottom: 12px; color: var(--text); font-weight: 600;">Platforms</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
              ${platforms.map(p => `<span style="background: var(--teal); color: #000; padding: 8px 16px; border-radius: 20px; font-size: 13px; text-transform: capitalize; font-weight: 600;">${p}</span>`).join('')}
            </div>
          </div>

          ${campaign.guidelines ? `
          <div style="margin-bottom: 28px;">
            <h3 style="font-size: 16px; margin-bottom: 12px; color: var(--text); font-weight: 600;">Guidelines</h3>
            <ul style="color: var(--text-secondary); line-height: 1.8; padding-left: 20px; list-style: disc;">
              ${campaign.guidelines.split(/[\n\r]+/).filter(l => l.trim()).map(line => 
                `<li style="margin-bottom: 6px;">${line.replace(/^[-•*]\s*/, '').trim()}</li>`
              ).join('')}
            </ul>
          </div>
          ` : ''}
          
          ${campaign.assets_url ? `
          <div style="margin-bottom: 28px;">
            <h3 style="font-size: 16px; margin-bottom: 12px; color: var(--text); font-weight: 600;">Assets</h3>
            <a href="${campaign.assets_url}" target="_blank" style="display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 10px; color: var(--teal); text-decoration: none; font-weight: 600; font-size: 14px; transition: all 0.2s;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Open Assets
            </a>
          </div>
          ` : ''}
          
          ${campaign.examples ? `
          <div style="margin-bottom: 28px;">
            <h3 style="font-size: 16px; margin-bottom: 12px; color: var(--text); font-weight: 600;">Examples</h3>
            <div style="display: flex; flex-direction: column; gap: 8px;">
              ${campaign.examples.split(/[\n\r]+/).filter(l => l.trim()).map(url => 
                `<a href="${url.trim()}" target="_blank" style="color: var(--teal); font-size: 14px; text-decoration: none; padding: 8px 0; border-bottom: 1px solid var(--border);">${url.trim()}</a>`
              ).join('')}
            </div>
          </div>
          ` : ''}

          <div style="display: flex; gap: 16px; margin-top: 32px;">
            ${isJoined ? `
              <button style="flex: 1; padding: 16px; background: var(--bg-elevated); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 10px; font-size: 16px; cursor: not-allowed;" disabled>
                ✓ Already Joined
              </button>
              <a href="/submissions" style="flex: 1; padding: 16px; background: var(--teal); color: #000; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none;">
                Submit Content →
              </a>
            ` : `
              <button onclick="joinCampaign('${campaign.id}')" style="flex: 1; padding: 16px; background: var(--teal); color: #000; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;">
                Join Campaign
              </button>
            `}
            <button onclick="closeModal()" style="padding: 16px 32px; background: var(--bg-elevated); color: var(--text); border: 1px solid var(--border); border-radius: 10px; font-size: 16px; cursor: pointer;">
              Close
            </button>
          </div>
        </div>
      `;
      
      modal.classList.add('active');
    }

    async function joinCampaign(campaignId) {
      const token = localStorage.getItem('token');
      if (!token) {
        alert('Please log in to join campaigns');
        window.location.href = 'index-2.html';
        return;
      }

      try {
        const response = await fetch(`${API_URL}/campaigns/${campaignId}/join`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        });

        const data = await response.json();
        
        if (response.ok) {
          alert(`🎉 Successfully joined the campaign! You earned ${data.xpAwarded || 25} XP!`);
          joinedCampaignIds.push(campaignId);
          closeModal();
          // Refresh XP display
          loadUserData();
          // Refresh to show updated state
          openCampaign(campaignId);
        } else {
          alert(data.error || 'Failed to join campaign');
        }
      } catch (e) {
        console.error('Join campaign error:', e);
        alert('Error joining campaign: ' + e.message);
      }
    }

    function closeModal() {
      document.getElementById('campaignModal').classList.remove('active');
    }

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      localStorage.removeItem('token');
      window.location.href = 'index-2.html';
    });

    // Filter and search functionality
    function applyFilters() {
      const term = (document.getElementById('searchInput')?.value || '').toLowerCase();
      const platform = document.getElementById('platformFilter')?.value || '';
      const sort = document.getElementById('sortFilter')?.value || 'newest';
      
      let filtered = [...allCampaigns];
      
      // Search filter
      if (term) {
        filtered = filtered.filter(c => 
          c.title.toLowerCase().includes(term) || 
          (c.description || '').toLowerCase().includes(term)
        );
      }
      
      // Platform filter
      if (platform) {
        filtered = filtered.filter(c => {
          const platforms = Array.isArray(c.platforms) ? c.platforms : JSON.parse(c.platforms || '[]');
          return platforms.some(p => p.toLowerCase() === platform.toLowerCase());
        });
      }
      
      // Sort
      switch (sort) {
        case 'payout-high':
          filtered.sort((a, b) => (b.cpm_rate || 0) - (a.cpm_rate || 0));
          break;
        case 'payout-low':
          filtered.sort((a, b) => (a.cpm_rate || 0) - (b.cpm_rate || 0));
          break;
        case 'ending':
          filtered.sort((a, b) => {
            if (!a.ends_at) return 1;
            if (!b.ends_at) return -1;
            return new Date(a.ends_at) - new Date(b.ends_at);
          });
          break;
        case 'newest':
        default:
          filtered.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
      }
      
      renderCampaigns(filtered);
    }
    
    document.getElementById('searchInput')?.addEventListener('input', applyFilters);
    document.getElementById('platformFilter')?.addEventListener('change', applyFilters);
    document.getElementById('sortFilter')?.addEventListener('change', applyFilters);

    // Mobile menu toggle
    document.getElementById('mobileMenuToggle')?.addEventListener('click', () => {
      const sidebar = document.querySelector('.sidebar');
      sidebar?.classList.toggle('active');
    });

    // Close sidebar when clicking outside
    document.addEventListener('click', (e) => {
      const sidebar = document.querySelector('.sidebar');
      const toggle = document.getElementById('mobileMenuToggle');
      if (sidebar && toggle && !sidebar.contains(e.target) && !toggle.contains(e.target)) {
        sidebar.classList.remove('active');
      }
    });
  </script>
</body>
