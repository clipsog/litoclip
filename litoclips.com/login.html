<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — LitoClips</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;700&family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    .login-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
    .login-card { width: 100%; max-width: 420px; background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 40px; }
    .login-card h1 { font-size: 24px; margin-bottom: 8px; }
    .login-card .subtitle { color: rgba(255,255,255,0.6); font-size: 15px; margin-bottom: 28px; }
    .login-card .form-group { margin-bottom: 20px; }
    .login-card .form-error { color: #ef4444; font-size: 14px; margin-top: 8px; }
    .login-card .btn-full { width: 100%; justify-content: center; margin-top: 8px; }
    .login-footer { margin-top: 24px; text-align: center; }
    .login-footer a { color: #2563eb; text-decoration: none; font-size: 14px; }
    .login-footer a:hover { text-decoration: underline; }
    .back-home { display: inline-block; margin-bottom: 24px; color: rgba(255,255,255,0.6); font-size: 14px; text-decoration: none; }
    .back-home:hover { color: #2563eb; }
  </style>
</head>
<body class="gradient-section-bg">
  <a href="index.html" class="back-home">← Back to home</a>
  <main class="login-page">
    <div class="login-card">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account</p>
      <a href="#" class="oauth-btn google" id="googleLoginBtn" style="display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 20px;margin-bottom:20px;background:#fff;color:#333;border:1px solid rgba(0,0,0,0.1);border-radius:12px;text-decoration:none;font-size:15px;">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </a>
      <div class="oauth-divider" style="display:flex;align-items:center;gap:16px;margin:20px 0;"><span style="flex:1;height:1px;background:rgba(255,255,255,0.1);"></span><span style="color:rgba(255,255,255,0.4);font-size:13px;">or</span><span style="flex:1;height:1px;background:rgba(255,255,255,0.1);"></span></div>
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div class="form-error" id="formError"></div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>
      <div class="login-footer">
        <p>Don't have an account? <a href="signup.html">Sign up</a></p>
      </div>
    </div>
  </main>
  <script>
    (function() {
      const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      const API_URL = isLocal ? 'http://localhost:37373/api/auth' : (window.location.origin + '/api/auth');
      const AUTH_BASE = isLocal ? 'http://localhost:37373' : window.location.origin;
      const form = document.getElementById('loginForm');
      const formError = document.getElementById('formError');
      const googleBtn = document.getElementById('googleLoginBtn');
      if (googleBtn) googleBtn.href = AUTH_BASE + '/auth/google';

      function getDashboardHref(userType) {
        if (userType === 'sponsor') return 'sponsor-dashboard.html';
        return 'brand-overview.html';
      }

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        formError.textContent = '';
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        try {
          const res = await fetch(API_URL + '/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json().catch(function() { return {}; });
          if (res.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            localStorage.setItem('userType', data.user.userType || 'creator');
            window.location.href = getDashboardHref(data.user.userType);
          } else {
            formError.textContent = data.error || 'Invalid email or password.';
          }
        } catch (err) {
          formError.textContent = 'Network error. Please try again.';
        }
      });

      // Handle OAuth return: ?token= or ?error=
      const params = new URLSearchParams(window.location.search);
      const err = params.get('error');
      if (err) {
        formError.textContent = err === 'google_not_configured' ? 'Google sign-in is not set up yet.' : 'Sign-in failed. Please try again.';
        window.history.replaceState({}, '', 'login.html');
      }
      const token = params.get('token');
      if (token) {
        localStorage.setItem('token', token);
        fetch(API_URL.replace('/auth', '') + '/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(user) {
            if (user) {
              localStorage.setItem('user', JSON.stringify(user));
              localStorage.setItem('userType', user.userType || 'creator');
              window.location.replace(getDashboardHref(user.userType));
            } else { window.history.replaceState({}, '', 'login.html'); }
          })
          .catch(function() { window.history.replaceState({}, '', 'login.html'); });
      }
    })();
  </script>
</body>
</html>
