<!DOCTYPE html>
<html lang="en">

<!-- Added by HTTrack --><meta http-equiv="content-type" content="text/html;charset=UTF-8" /><!-- /Added by HTTrack -->
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Submissions - LitoClips</title>
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="litoclips-theme.css">
  <style>
    /* Stats Grid */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    
    .stat-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .stat-icon svg {
      width: 24px;
      height: 24px;
    }
    
    .stat-icon.blue { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
    .stat-icon.yellow { background: rgba(234, 179, 8, 0.15); color: #eab308; }
    .stat-icon.green { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
    .stat-icon.teal { background: rgba(37, 99, 235, 0.15); color: var(--teal); }
    .stat-icon.purple { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
    .stat-icon.pink { background: rgba(236, 72, 153, 0.15); color: #ec4899; }
    
    .stat-data .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
    }
    
    .stat-data .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    
    /* Filter Bar */
    .filter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .tabs {
      display: flex;
      gap: 8px;
      background: var(--bg-elevated);
      padding: 4px;
      border-radius: 12px;
    }
    
    .tab {
      padding: 10px 20px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
    }
    
    .tab:hover {
      color: var(--text-primary);
    }
    
    .tab.active {
      background: var(--teal);
      color: white;
    }
    
    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .refresh-btn:hover {
      border-color: var(--teal);
      color: var(--teal);
    }
    
    .refresh-btn.loading svg {
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Submissions Table */
    .submissions-table {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    
    .table-header {
      display: grid;
      grid-template-columns: 2fr 120px 100px 100px 100px 100px 100px 100px;
      padding: 14px 20px;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .table-header span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .submission-row {
      display: grid;
      grid-template-columns: 2fr 120px 100px 100px 100px 100px 100px 100px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      transition: background 0.2s;
    }
    
    .submission-row:hover {
      background: var(--bg-hover);
    }
    
    .submission-row:last-child {
      border-bottom: none;
    }
    
    /* Content Cell */
    .content-cell {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    
    .platform-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .platform-icon svg {
      width: 22px;
      height: 22px;
    }
    
    .platform-icon.tiktok { background: linear-gradient(135deg, #00f2ea, #ff0050); color: white; }
    .platform-icon.youtube { background: #ff0000; color: white; }
    .platform-icon.instagram { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); color: white; }
    .platform-icon.twitter { background: #1da1f2; color: white; }
    
    .content-info {
      min-width: 0;
    }
    
    .content-campaign {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .content-url {
      font-size: 12px;
      color: var(--teal);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-decoration: none;
    }
    
    .content-url:hover {
      text-decoration: underline;
    }
    
    /* Status Badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-badge.pending {
      background: rgba(234, 179, 8, 0.15);
      color: #eab308;
    }
    
    .status-badge.approved {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
    }
    
    .status-badge.rejected {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }
    
    /* Stat Cells */
    .stat-cell {
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .stat-cell.views { color: #3b82f6; }
    .stat-cell.likes { color: #ec4899; }
    .stat-cell.comments { color: #a855f7; }
    .stat-cell.shares { color: #22c55e; }
    .stat-cell.earnings { color: var(--teal); }
    
    .stat-cell svg {
      width: 14px;
      height: 14px;
      opacity: 0.7;
    }
    
    /* Date Cell */
    .date-cell {
      font-size: 13px;
      color: var(--text-muted);
    }
    
    /* Empty State */
    .empty-state {
      padding: 80px 40px;
      text-align: center;
    }
    
    .empty-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: rgba(37, 99, 235, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    
    .empty-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    
    .empty-text {
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    
    .btn-browse {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--teal);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .btn-browse:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    }
    
    /* Last Updated */
    .last-updated {
      text-align: center;
      padding: 16px;
      font-size: 13px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
    
    /* Mobile */
    @media (max-width: 1200px) {
      .stats-row {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .table-header,
      .submission-row {
        grid-template-columns: 2fr 100px 80px 80px 80px 90px;
      }
      
      .table-header span:nth-child(7),
      .table-header span:nth-child(8),
      .submission-row > *:nth-child(7),
      .submission-row > *:nth-child(8) {
        display: none;
      }
    }
    
    @media (max-width: 768px) {
      .stats-row {
        grid-template-columns: 1fr 1fr;
      }
      
      .table-header {
        display: none;
      }
      
      .submission-row {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 20px;
      }
      
      .content-cell {
        width: 100%;
      }
    }
  </style>
</head>

  <script>
    const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    const API_URL = isLocalhost ? 'http://localhost:37373/api' : `${window.location.origin}/api`;
    let allSubmissions = [];
    let currentFilter = 'all';

    document.addEventListener('DOMContentLoaded', () => {
      loadSubmissions();
      loadUserData();
      setupTabs();
    });

    async function loadUserData() {
      try {
        const token = localStorage.getItem('token');
        if (!token) {
          window.location.href = 'index-2.html';
          return;
        }
        
        const response = await fetch(`${API_URL}/auth/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
          const user = await response.json();
          document.getElementById('userName').textContent = user.name || 'User';
        }
        
        const gamRes = await fetch(`${API_URL}/gamification/profile`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (gamRes.ok) {
          const profile = await gamRes.json();
          document.getElementById('headerLevel').textContent = profile.level || 1;
          document.getElementById('headerXP').textContent = `${profile.xp || 0} / ${profile.nextLevelXP || 174} XP`;
        }
      } catch (e) { console.error(e); }
    }

    async function loadSubmissions() {
      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`${API_URL}/submissions`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (response.ok) {
          allSubmissions = await response.json();
          updateStats();
          renderSubmissions();
        }
      } catch (e) {
        console.error('Failed to load submissions:', e);
      }
    }

    function updateStats() {
      const subs = allSubmissions;
      const totalViews = subs.reduce((sum, s) => sum + (s.views || 0), 0);
      const totalLikes = subs.reduce((sum, s) => sum + (s.likes || 0), 0);
      const totalEarnings = subs.reduce((sum, s) => sum + (s.earnings || 0), 0);
      
      document.getElementById('totalSubmissions').textContent = subs.length;
      document.getElementById('totalViews').textContent = formatNumber(totalViews);
      document.getElementById('totalLikes').textContent = formatNumber(totalLikes);
      document.getElementById('totalEarnings').textContent = '$' + totalEarnings.toFixed(2);
    }

    function renderSubmissions() {
      const container = document.getElementById('submissionsList');
      let filtered = allSubmissions;
      
      if (currentFilter !== 'all') {
        filtered = allSubmissions.filter(s => s.status === currentFilter);
      }
      
      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📹</div>
            <div class="empty-title">No submissions yet</div>
            <div class="empty-text">Join a campaign and submit your first content</div>
            <a href="/browse-campaigns" class="btn-browse">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
              </svg>
              Browse Campaigns
            </a>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(sub => `
        <div class="submission-row">
          <div class="content-cell">
            <div class="platform-icon ${sub.platform}">
              ${getPlatformIcon(sub.platform)}
            </div>
            <div class="content-info">
              <div class="content-campaign">${sub.campaignTitle || 'Campaign'}</div>
              <a href="${sub.post_url}" target="_blank" class="content-url">${truncateUrl(sub.post_url)}</a>
            </div>
          </div>
          <div>
            <span class="status-badge ${sub.status}">
              ${getStatusIcon(sub.status)}
              ${capitalize(sub.status)}
            </span>
          </div>
          <div class="stat-cell views">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            ${formatNumber(sub.views || 0)}
          </div>
          <div class="stat-cell likes">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            ${formatNumber(sub.likes || 0)}
          </div>
          <div class="stat-cell comments">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
            ${formatNumber(sub.comments || 0)}
          </div>
          <div class="stat-cell shares">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
            ${formatNumber(sub.shares || 0)}
          </div>
          <div class="stat-cell earnings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
            $${(sub.earnings || 0).toFixed(2)}
          </div>
          <div class="date-cell">${formatDate(sub.created_at)}</div>
        </div>
      `).join('');
    }

    function getPlatformIcon(platform) {
      const icons = {
        tiktok: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>',
        youtube: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>',
        instagram: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>',
        twitter: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
        x: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
      };
      return icons[platform] || icons.tiktok;
    }

    function getStatusIcon(status) {
      const icons = {
        pending: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
        approved: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
        rejected: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
      };
      return icons[status] || '';
    }

    function truncateUrl(url) {
      if (!url) return '';
      try {
        const u = new URL(url.html);
        const path = u.pathname.length > 25 ? u.pathname.slice(0, 25) + '...' : u.pathname;
        return u.hostname + path;
      } catch {
        return url.slice(0, 40) + '...';
      }
    }

    function formatNumber(num) {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return num.toString();
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function setupTabs() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentFilter = tab.dataset.status;
          renderSubmissions();
        });
      });
    }

    async function refreshEngagement() {
      const btn = document.getElementById('refreshBtn');
      btn.classList.add('loading');
      btn.disabled = true;
      
      try {
        const token = localStorage.getItem('token');
        
        // Refresh engagement for all submissions
        for (const sub of allSubmissions) {
          try {
            await fetch(`${API_URL}/submissions/${sub.id}/refresh-engagement`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}` }
            });
          } catch (e) {
            console.error('Failed to refresh:', sub.id);
          }
        }
        
        // Reload all data
        await loadSubmissions();
      } catch (e) {
        console.error('Refresh failed:', e);
      }
      
      btn.classList.remove('loading');
      btn.disabled = false;
    }

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      localStorage.removeItem('token');
      window.location.href = 'index-2.html';
    });
  </script>
</body>
