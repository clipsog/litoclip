# Render Blueprint — LitoClips backend
# Deploy: connect this repo in Render Dashboard, or use "New > Blueprint" and point to repo.
# Set all environment variables in the Render Dashboard (Environment tab); do not commit secrets.

services:
  - type: web
    name: litoclips-backend
    # Paid instance — does not spin down when idle. Free tier sleeps after ~15 min of no traffic.
    # Requires a payment method on Render; see https://render.com/pricing#services
    plan: starter
    runtime: node
    rootDir: backend

    buildCommand: npm install
    startCommand: npm start

    # Render sets PORT automatically; app uses process.env.PORT
    # Add in Dashboard: NODE_ENV, JWT_SECRET, FRONTEND_ORIGIN,
    # DATABASE_URL (Supabase PostgreSQL) or DATABASE_PATH (SQLite + persistent disk),
    # GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_CALLBACK_URL (e.g. https://YOUR_DOMAIN/auth/google/callback),
    # Stripe keys, etc. See docs/RENDER_DEPLOY.md for the full list.
